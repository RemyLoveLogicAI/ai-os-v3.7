# Railway.app deployment config for AI OS v3.7
# https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/Dockerfile"

[deploy]
startCommand = "uvicorn src.api.server:app --host 0.0.0.0 --port $PORT --workers 2"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "ai-os"

[services.variables]
AI_OS_ENV = "production"
LOG_LEVEL = "INFO"
WORKERS = "2"
